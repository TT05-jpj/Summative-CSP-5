<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caretaker Dashboard</title>
  <link rel="stylesheet" href="caretaker.css" />
</head>

<body>

  <header>
    <h1>Caretaker Dashboard</h1>
    <a href="scanner.html"
      style="padding:8px 16px;font-size:14px;font-weight:500;background:#4ade80;color:#000;border-radius:8px;text-decoration:none;">📷 Scanner</a>
    <!-- Language Settings -->
    <div id="lang-bar"
      style="display:flex;align-items:center;gap:20px;padding:22px 36px;background:#142054;border-bottom:1px solid #0a2070;font-size:22px;color:#aab0cc;">
      <span>🌐 Languages:</span>
      <select id="caretaker-lang" 
      style="background:#020d3a;color:#fff;border:1px solid #0a2070;border-radius:8px;padding:12px 18px;font-size:18px;">
        <option value="en">Caretaker: English</option>
        <option value="es">Caretaker: Spanish</option>
        <option value="fr">Caretaker: French</option>
        <option value="de">Caretaker: German</option>
        <option value="it">Caretaker: Italian</option>
        <option value="pt">Caretaker: Portuguese</option>
        <option value="zh">Caretaker: Chinese</option>
        <option value="ja">Caretaker: Japanese</option>
        <option value="ko">Caretaker: Korean</option>
        <option value="ar">Caretaker: Arabic</option>
        <option value="hi">Caretaker: Hindi</option>
        <option value="ta">Caretaker: Tamil</option>
        <option value="te">Caretaker: Telugu</option>
        <option value="bn">Caretaker: Bengali</option>
        <option value="ur">Caretaker: Urdu</option>
        <option value="ru">Caretaker: Russian</option>
        <option value="tr">Caretaker: Turkish</option>
        <option value="vi">Caretaker: Vietnamese</option>
        <option value="th">Caretaker: Thai</option>
        <option value="pl">Caretaker: Polish</option>
        <option value="nl">Caretaker: Dutch</option>
        <option value="sv">Caretaker: Swedish</option>
        <option value="ro">Caretaker: Romanian</option>
        <option value="el">Caretaker: Greek</option>
        <option value="he">Caretaker: Hebrew</option>
        <option value="fa">Caretaker: Persian</option>
        <option value="sw">Caretaker: Swahili</option>
        <option value="tl">Caretaker: Filipino</option>
        <option value="ms">Caretaker: Malay</option>
        <option value="id">Caretaker: Indonesian</option>
      </select>

      <select id="user-lang"
        style="background:#020d3a;color:#fff;border:1px solid #0a2070;border-radius:8px;padding:12px 18px;font-size:18px;">
        <option value="en">User: English</option>
        <option value="es">User: Spanish</option>
        <option value="fr">User: French</option>
        <option value="de">User: German</option>
        <option value="it">User: Italian</option>
        <option value="pt">User: Portuguese</option>
        <option value="zh">User: Chinese</option>
        <option value="ja">User: Japanese</option>
        <option value="ko">User: Korean</option>
        <option value="ar">User: Arabic</option>
        <option value="hi">User: Hindi</option>
        <option value="ta">User: Tamil</option>
        <option value="te">User: Telugu</option>
        <option value="bn">User: Bengali</option>
        <option value="ur">User: Urdu</option>
        <option value="ru">User: Russian</option>
        <option value="tr">User: Turkish</option>
        <option value="vi">User: Vietnamese</option>
        <option value="th">User: Thai</option>
        <option value="pl">User: Polish</option>
        <option value="nl">User: Dutch</option>
        <option value="sv">User: Swedish</option>
        <option value="ro">User: Romanian</option>
        <option value="el">User: Greek</option>
        <option value="he">User: Hebrew</option>
        <option value="fa">User: Persian</option>
        <option value="sw">User: Swahili</option>
        <option value="tl">User: Filipino</option>
        <option value="ms">User: Malay</option>
        <option value="id">User: Indonesian</option>
      </select>
      <span id="lang-saved" style="color:#4ade80;display:none;">✓ Saved</span>
    </div>
  </header>

  <!-- Card grid — same id pattern as your recipe site's reccontainer -->
  <div id="object-container"></div>

  <!-- View instructions popup — same pattern as your missing-popup -->
  <div class="popup-overlay" id="view-popup">
    <div class="popup-box">
      <button id="close-view">×</button>
      <h2 id="popup-obj-name"></h2>
      <p id="popup-obj-instr"></p>
    </div>
  </div>

  <!-- Add / Edit modal -->
  <div id="modal-overlay">
    <div id="modal">
      <h2 id="modal-title">Add Object</h2>
      <div class="field">
        <label>Object name</label>
        <div class="input-row">
          <input id="input-name" type="text" placeholder='e.g. "pill bottle"' />
          <button class="mic-btn" id="mic-name" type="button">mic</button>
        </div>
      </div>
      <div class="field">
        <label>Instructions</label>
        <div class="input-row">
          <textarea id="input-instr" placeholder='e.g. "Take one tablet with water."'></textarea>
          <button class="mic-btn" id="mic-instr" type="button">mic</button>
        </div>
      </div>
      <div id="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-save">Save</button>
      </div>
    </div>
  </div>
  <script>
    const ctLang = document.getElementById('caretaker-lang');
    const usLang = document.getElementById('user-lang');
    const langSaved = document.getElementById('lang-saved');
    ctLang.value = localStorage.getItem('caretaker_lang') || 'en';
    usLang.value = localStorage.getItem('user_lang') || 'en';

    function translateText(text, targetLang) {
      if (targetLang === 'en') return Promise.resolve(text);
      return fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`)
        .then(r => r.json())
        .then(data => data[0].map(x => x[0]).join(''))
        .catch(() => text);
    }

    async function translateDashboard(lang) {
      if (lang === 'en') {
        document.querySelector('header h1').textContent = 'Caretaker Dashboard';
        document.getElementById('add-btn').textContent = '+ Add Object';
        return;
      }
      const [title, addObj] = await Promise.all([
        translateText('Caretaker Dashboard', lang),
        translateText('+ Add Object', lang),
      ]);
      document.querySelector('header h1').textContent = title;
      document.getElementById('add-btn').textContent = addObj;
    }

    // store translations for card buttons so renderCards can use them
    window.ctTranslations = { view: 'VIEW INSTRUCTIONS', change: 'CHANGE INSTRUCTIONS', delete: 'DELETE' };

    async function loadTranslations(lang) {
      if (lang === 'en') {
        window.ctTranslations = { view: 'VIEW INSTRUCTIONS', change: 'CHANGE INSTRUCTIONS', delete: 'DELETE' };
        return;
      }
      const [view, change, del] = await Promise.all([
        translateText('VIEW INSTRUCTIONS', lang),
        translateText('CHANGE INSTRUCTIONS', lang),
        translateText('DELETE', lang),
      ]);
      window.ctTranslations = { view: view.toUpperCase(), change: change.toUpperCase(), delete: del.toUpperCase() };
    }

    async function initTranslations() {
      const lang = ctLang.value;
      await Promise.all([translateDashboard(lang), loadTranslations(lang)]);
      if (typeof renderCards === 'function') renderCards();
    }

    initTranslations();

    ctLang.addEventListener('change', () => {
      localStorage.setItem('caretaker_lang', ctLang.value);
      langSaved.style.display = 'inline';
      setTimeout(() => langSaved.style.display = 'none', 2000);
      initTranslations();
    });

    usLang.addEventListener('change', () => {
      localStorage.setItem('user_lang', usLang.value);
      langSaved.style.display = 'inline';
      setTimeout(() => langSaved.style.display = 'none', 2000);
    });
  </script>
  <script src="caretaker.js"></script>
</body>

</html>
