<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caretaker Dashboard</title>
  <link rel="stylesheet" href="caretaker.css" />
</head>
<body>

  <header>
    <h1>Caretaker Dashboard</h1>
    <button id="add-btn">+ Add Object</button>
  </header>

  <div id="grid">
    <div id="empty">No objects yet. Click <strong>+ Add Object</strong> to get started.</div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <h2 id="modal-title">Add Object</h2>
      <div class="field">
        <label>Object name</label>
        <input id="input-name" type="text" placeholder='e.g. "pill bottle"' />
      </div>
      <div class="field">
        <label>Instructions</label>
        <textarea id="input-instructions" placeholder='e.g. "Take one tablet with water after meals."'></textarea>
      </div>
      <div id="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-save">Save</button>
      </div>
    </div>
  </div>
  <script src="caretaker.js"></script>
</body>
</html>
