<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Object Scanner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #dbeafe;
      color: #03114F;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    /* top bar */
    .topbar {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 900px;
      margin-bottom: 16px;
      gap: 12px;
      background: #142054;
      position: relative;
    }

    .back-btn {
      background: none;
      border: none;
      color: #aab0cc;
      font-size: 27px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    .back-btn:hover {
      color: #fff;
    }

    .topbar h1 {
      font-size: 26px;
      font-weight: 500;
      color: #fff;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* camera */
    #cam-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 900px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      border: 1px solid #0a2070;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas {
      display: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* scan frame corners */
    #scan-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #scan-frame .corner {
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: #facc15;
      border-style: solid;
      border-width: 0;
    }

    #scan-frame .tl {
      top: 20px;
      left: 20px;
      border-top-width: 3px;
      border-left-width: 3px;
      border-top-left-radius: 4px;
    }

    #scan-frame .tr {
      top: 20px;
      right: 20px;
      border-top-width: 3px;
      border-right-width: 3px;
      border-top-right-radius: 4px;
    }

    #scan-frame .bl {
      bottom: 20px;
      left: 20px;
      border-bottom-width: 3px;
      border-left-width: 3px;
      border-bottom-left-radius: 4px;
    }

    #scan-frame .br {
      bottom: 20px;
      right: 20px;
      border-bottom-width: 3px;
      border-right-width: 3px;
      border-bottom-right-radius: 4px;
    }

    #scan-line {
      position: absolute;
      left: 20px;
      right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #facc15, transparent);
      top: 20px;
      display: none;
      animation: scandown 1.5s ease-in-out infinite;
    }

    @keyframes scandown {
      0% {
        top: 20px;
        opacity: 1;
      }

      90% {
        top: calc(100% - 22px);
        opacity: 1;
      }

      100% {
        top: calc(100% - 22px);
        opacity: 0;
      }
    }

    #scan-line.active {
      display: block;
    }

    /* cam start screen */
    #cam-start {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #03114F;
    }

    #cam-start p {
      font-size: 20px;
      color: #aab0cc;
      text-align: center;
      max-width: 280px;
    }

    #start-btn {
      padding: 14px 30px;
      font-size: 22px;
      font-weight: 500;
      background: #ffffff;
      color: #03114F;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #start-btn:hover {
      background: #e8e8e8;
    }

    /* status */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 640px;
      margin-top: 12px;
      font-size: 20px;
      color: #03114F;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0a2070;
      flex-shrink: 0;
    }

    #status-dot.active {
      background: #facc15;
    }

    #status-dot.scanning {
      background: #facc15;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    /* scan button */
    #controls {
      width: 100%;
      max-width: 640px;
      margin-top: 12px;
    }

    #scan-btn {
      width: 100%;
      padding: 20px;
      font-size: 26px;
      font-weight: 500;
      background: #142054;
      color: #fff;
      border: 1px solid #0a2070;
      border-radius: 12px;
      cursor: pointer;
    }

    #scan-btn:hover:not(:disabled) {
      border-color: #facc15;
      color: #facc15;
    }

    #scan-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* result */
    #result-panel {
      display: none;
      width: 100%;
      max-width: 640px;
      margin-top: 14px;
      background: #2254c5;
      border: 1px solid #0a2070;
      border-radius: 12px;
      padding: 16px;
      gap: 10px;
      flex-direction: column;
    }

    #result-panel.show {
      display: flex;
    }

    #scan-photo {
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
      display: none;
    }

    #scan-photo.show {
      display: block;
    }

    #result-obj-name {
      font-size: 26px;
      font-weight: 700;
      color: #facc15;
      text-transform: capitalize;
    }

    #result-instructions {
      font-size: 22px;
      color: #fff;
      line-height: 1.6;
    }

    /* instructions popup */
    #instr-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #instr-popup.show {
      display: flex;
    }

    #instr-box {
      background: #142054;
      border: 1px solid #2254c5;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
    }

    #instr-box h2 {
      font-size: 32px;
      font-weight: 600;
      color: #facc15;
    }

    #instr-box p {
      font-size: 24px;
      color: #aab0cc;
      line-height: 1.7;
    }

    #close-instr {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 27px;
      color: #aab0cc;
      cursor: pointer;
    }

    #close-instr:hover {
      color: #fff;
    }

    #speak-again-btn {
      padding: 10px;
      font-size: 16px;
      background: #142054;
      border: 1px solid #0a2070;
      border-radius: 8px;
      color: #aab0cc;
      cursor: pointer;
      text-align: center;
    }

    #speak-again-btn:hover {
      background: #142054;
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='home.html'">←</button>
    <h1>Object Scanner</h1>
  </div>

  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
    <div id="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="scan-line"></div>
    </div>
    <div id="cam-start">
      <button id="start-btn">Enable Camera</button>
      <p>Allow camera access to start scanning</p>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Camera off</span>
  </div>

  <div id="controls">
    <button id="scan-btn" disabled>Scan Object</button>
  </div>

  <div id="how-to" style="width:100%;max-width:900px;margin-top:14px;background:#142054;border-radius:12px;padding:18px 22px;display:flex;flex-direction:column;gap:8px;">
    <p style="font-size:20px;font-weight:700;color:#facc15;margin:0;">How to use</p>
    <p style="font-size:18px;color:#dbeafe;margin:0;">1. Tap <strong>Enable Camera</strong> and allow access.</p>
    <p style="font-size:18px;color:#dbeafe;margin:0;">2. Point the camera at an object.</p>
    <p style="font-size:18px;color:#dbeafe;margin:0;">3. Tap <strong>Scan Object</strong> — instructions will appear and be read aloud.</p>
  </div>

  <div id="result-panel">
    <div id="result-obj-name"></div>
    <div id="result-instructions"></div>
  </div>

  <!-- Instructions popup -->
  <div id="instr-popup">
    <div id="instr-box">
      <button id="close-instr">×</button>
      <h2 id="instr-name"></h2>
      <p id="instr-text"></p>
      <button id="speak-again-btn">🔊 Speak again</button>
    </div>
  </div>

  <script>
    
    const STORAGE_KEY = 'accessibility_objects';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const camStart = document.getElementById('cam-start');
    const scanBtn = document.getElementById('scan-btn');
    const scanLine = document.getElementById('scan-line');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const resultPanel = document.getElementById('result-panel');
    const resultObjName = document.getElementById('result-obj-name');
    const resultInstructions = document.getElementById('result-instructions');
    const instrPopup = document.getElementById('instr-popup');
    const instrName = document.getElementById('instr-name');
    const instrText = document.getElementById('instr-text');
    const closeInstr = document.getElementById('close-instr');
    const speakAgainBtn = document.getElementById('speak-again-btn');
    let lastDataUrl = null;

    let lastDetections = [];
    let stream = null;
    let currentSpeakText = '';

    const msgs = {
      cameraOff:    'Camera off',
      ready:        'Point at an object and tap Scan',
      scanning:     'Scanning...',
      complete:     'Scan complete',
      noFrame:      'Could not capture frame',
      error:        'Error',
      notDetected:  'Try pointing the camera more directly at the object.',
      notSetUp:     'This object has not been set up by your caretaker yet.',
    };

    async function loadStatusTranslations() {
      const lang = localStorage.getItem('user_lang') || 'en';
      if (lang === 'en') return;
      const keys = Object.keys(msgs);
      const translated = await Promise.all(
        keys.map(k => fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(msgs[k])}`)
          .then(r => r.json()).then(d => d[0].map(x => x[0]).join('')).catch(() => msgs[k]))
      );
      keys.forEach((k, i) => { msgs[k] = translated[i]; });
    }

    function setStatus(text, mode) {
      statusText.textContent = text;
      statusDot.className = mode || '';
    }

    // ── Text to speech ────────────────────────────────────────────────────────
    function speak(text) {
      const userLang = localStorage.getItem('user_lang') || 'en';

      window.speechSynthesis.cancel();

      // unlock browser audio
      const unlockUtt = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(unlockUtt);

      const translateAndSpeak = (textToSpeak) => {
        if (userLang === 'en') {
          speakWithOpenAI(textToSpeak);
        } else {
          fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${userLang}&dt=t&q=${encodeURIComponent(textToSpeak)}`)
            .then(r => r.json())
            .then(data => {
              const translated = data[0].map(x => x[0]).join('') || textToSpeak;
              currentSpeakText = translated;
              speakWithOpenAI(translated);
            })
            .catch(() => speakWithOpenAI(textToSpeak));
        }
      };

      function speakWithOpenAI(textToSay) {
        if (userLang === 'en') {
          // use OpenAI for English (sounds better)
         fetch('/api/tts', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              model: 'tts-1',
              input: textToSay,
              voice: 'alloy'
            })
          })
            .then(r => r.blob())
            .then(blob => {
              const url = URL.createObjectURL(blob);
              const audio = new Audio(url);
              audio.play();
              currentSpeakText = textToSay;
            })
            .catch(e => console.error('TTS error:', e));
        } else {
          // use browser native voice for other languages — proper accent
          const utt = new SpeechSynthesisUtterance(textToSay);
          utt.lang = userLang;
          utt.rate = 0.9;
          utt.volume = 1;
          window.speechSynthesis.speak(utt);
          currentSpeakText = textToSay;
        }
      }

      translateAndSpeak(text);
    }
    speakAgainBtn.addEventListener('click', () => { if (currentSpeakText) speak(currentSpeakText); });

    // ── Load caretaker objects ────────────────────────────────────────────────
    function getCaretakerObjects() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function checkMatches(detections) {
      const lc = detections.map(d => d.toLowerCase());
      const matches = [];
      for (const obj of getCaretakerObjects()) {
        if (lc.some(d => d.includes(obj.name.toLowerCase()) || obj.name.toLowerCase().includes(d))) {
          matches.push({ name: obj.name, instructions: obj.instructions });
        }
      }
      return matches;
    }

    // ── Overlay labels (tappable if instructions exist) ───────────────────────
    async function showOverlayLabels(matches) {
      overlay.innerHTML = '';
      if (!matches.length) return;
      const vw = video.offsetWidth;
      const vh = video.offsetHeight;
      const tapLabel = await translateForUser('tap for details');
      for (const m of matches) {
        const cx = vw * 0.5;
        const cy = vh * 0.38;

        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
        dot.setAttribute('r', 8); dot.setAttribute('fill', '#facc15');
        dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', 2);
        overlay.appendChild(dot);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', cx); line.setAttribute('y1', cy - 8);
        line.setAttribute('x2', cx); line.setAttribute('y2', cy - 40);
        line.setAttribute('stroke', '#facc15'); line.setAttribute('stroke-width', 2);
        overlay.appendChild(line);

        const bw = 180, bh = m.instructions ? 70 : 46;
        const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
        fo.setAttribute('x', cx - bw / 2);
        fo.setAttribute('y', cy - 40 - bh);
        fo.setAttribute('width', bw);
        fo.setAttribute('height', bh);

        const hasInstr = !!m.instructions;
        const bubbleName = await translateForUser(m.name);
        fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" style="background:#142054;border:1.5px solid #facc15;border-radius:12px;padding:8px 12px;pointer-events:all;cursor:pointer;" onclick="${hasInstr ? `showInstructions('${m.name.replace(/'/g, "\\'")}','${m.instructions.replace(/'/g, "\\'")}')` : `speak('${m.name.replace(/'/g, "\\'")}')`}">
          <div style="color:#facc15;font-size:14px;font-weight:700;text-align:center;">${bubbleName}</div>
          ${hasInstr ? `<div style="margin-top:4px;font-size:10px;color:#aaa;text-align:center;">${tapLabel}</div>` : ''}
        </div>`;
        overlay.appendChild(fo);
      }
    }

    // ── Translation helper ────────────────────────────────────────────────────
    function translateForUser(text) {
      const lang = localStorage.getItem('user_lang') || 'en';
      if (lang === 'en') return Promise.resolve(text);
      return fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`)
        .then(r => r.json())
        .then(d => d[0].map(x => x[0]).join('') || text)
        .catch(() => text);
    }

    // ── Instructions popup ────────────────────────────────────────────────────
    async function showInstructions(name, instructions) {
      instrPopup.classList.add('show');
      instrName.textContent = name;
      instrText.textContent = instructions;
      const [tName, tInstr] = await Promise.all([
        translateForUser(name),
        translateForUser(instructions),
      ]);
      instrName.textContent = tName;
      instrText.textContent = tInstr;
      speak(name + '. ' + instructions);
    }

    closeInstr.addEventListener('click', () => instrPopup.classList.remove('show'));
    instrPopup.addEventListener('click', e => { if (e.target === instrPopup) instrPopup.classList.remove('show'); });


    // ── Camera ────────────────────────────────────────────────────────────────
    startBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        camStart.style.display = 'none';
        scanBtn.disabled = false;
        setStatus(msgs.ready, 'active');
      } catch (e) {
        camStart.querySelector('p').textContent = 'Camera access denied. Check browser permissions.';
      }
    });

    function captureFrame() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(video, 0, 0, w, h);
      return canvas.toDataURL('image/jpeg', 0.8);
    }

    // ── Scan ──────────────────────────────────────────────────────────────────
    scanBtn.addEventListener('click', async () => {
      if (!stream) return;
      scanBtn.disabled = true;
      scanLine.classList.add('active');
      setStatus(msgs.scanning, 'scanning');
      overlay.innerHTML = '';
      const unlockUtt = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(unlockUtt);
      let dataUrl, base64;
      try {
        dataUrl = captureFrame();
        lastDataUrl = dataUrl;
        base64 = dataUrl.split(',')[1];
      }
      catch (e) { setStatus(msgs.noFrame, ''); scanBtn.disabled = false; scanLine.classList.remove('active'); return; }

      resultPanel.className = 'show';
      translateForUser('Scanning...').then(t => { resultObjName.textContent = t; });
      resultInstructions.textContent = '';

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 500,
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64}` } },
                { type: 'text', text: 'You are an accessibility assistant. Identify ONLY the single most prominent object — the one closest to the camera or most centered in the frame. Ignore background objects. Respond ONLY with raw JSON: {"objects": ["name of object"], "description": "one friendly sentence about that object"}' }
              ]
            }]
          })
        });

        const data = await resp.json();
        const text = data.choices?.[0]?.message?.content || '';
        let parsed;
        try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
        catch (e) { parsed = { objects: [], description: text }; }

        lastDetections = parsed.objects || [];
        const matches = checkMatches(lastDetections);
        showOverlayLabels(matches);

        if (matches.length) {
          const withInstr = matches.find(m => m.instructions);
          translateForUser(matches[0].name).then(t => { resultObjName.textContent = t; });
          if (withInstr) {
            translateForUser(withInstr.instructions).then(t => { resultInstructions.textContent = t; });
            showInstructions(withInstr.name, withInstr.instructions);
          } else {
            translateForUser('No instructions saved for this object.').then(t => { resultInstructions.textContent = t; });
            speak(matches[0].name);
          }
        } else if (lastDetections.length) {
          translateForUser(lastDetections[0]).then(t => { resultObjName.textContent = t; });
          translateForUser('This object has not been set up by your caretaker yet.').then(t => { resultInstructions.textContent = t; });
          speak(lastDetections[0]);
        } else {
          translateForUser('Nothing detected').then(t => { resultObjName.textContent = t; });
          translateForUser('Try pointing the camera more directly at the object.').then(t => { resultInstructions.textContent = t; });
        }

        setStatus(msgs.complete, 'active');
      } catch (e) {
        translateForUser('Scan failed').then(t => { resultObjName.textContent = t; });
        translateForUser('Please check your connection and try again.').then(t => { resultInstructions.textContent = t; });
        console.error(e);
        setStatus(msgs.error, '');
      }

      scanLine.classList.remove('active');
      scanBtn.disabled = false;
    });

    // ── UI translation ────────────────────────────────────────────────────────
    function translateUI() {
      const lang = localStorage.getItem('user_lang') || 'en';
      if (lang === 'en') return;

      const items = [
        { el: document.querySelector('.topbar h1'),    text: 'Object Scanner' },
        { el: startBtn,                                text: 'Enable Camera' },
        { el: scanBtn,                                 text: 'Scan Object' },
        { el: document.querySelector('#cam-start p'),  text: 'Allow camera access to start scanning' },
        { el: speakAgainBtn,                           text: '🔊 Speak again' },
        { el: document.querySelector('.back-btn'),     text: '←' },
      ];

      const howToSteps = [
        { el: document.querySelector('#how-to p:nth-child(1)'), text: 'How to use' },
        { el: document.querySelector('#how-to p:nth-child(2)'), text: '1. Tap Enable Camera and allow access.' },
        { el: document.querySelector('#how-to p:nth-child(3)'), text: '2. Point the camera at an object.' },
        { el: document.querySelector('#how-to p:nth-child(4)'), text: '3. Tap Scan Object — instructions will appear and be read aloud.' },
      ];

      [...items, ...howToSteps].forEach(({ el, text }) => {
        if (!el) return;
        fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`)
          .then(r => r.json())
          .then(data => { el.textContent = data[0].map(x => x[0]).join('') || text; })
          .catch(() => {});
      });

    }

    async function initUserTranslations() {
      await loadStatusTranslations();
      setStatus(msgs.cameraOff, '');
      translateUI();
    }

    initUserTranslations();
  </script>
</body>

</html>
