<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script>document.documentElement.dataset.theme = localStorage.getItem('app-theme') || '';</script>
  <title>Scan</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(12px + env(safe-area-inset-top)) 14px calc(12px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 640px;
      margin-bottom: 10px;
      gap: 10px;
      position: relative;
      flex-shrink: 0;
    }


    .topbar h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    #cam-wrap {
      position: relative;
      flex: 1; min-height: 0;
      width: 100%; max-width: 640px;
      border-radius: 16px; overflow: hidden;
      background: #000;
      border: 2px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }
    #overlay { position: absolute; inset: 0; pointer-events: none; }

    #cam-start {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; background: #111;
    }
    #cam-start p { font-size: 17px; color: rgba(255,255,255,0.6); text-align: center; max-width: 280px; }
    #start-btn {
      padding: 16px 36px; font-size: 20px; font-weight: 700;
      background: var(--accent); color: var(--navy);
      border: none; border-radius: 12px; cursor: pointer;
      font-family: var(--font); transition: opacity 0.15s;
    }
    #start-btn:hover { opacity: 0.88; }

    #status-bar {
      display: flex; align-items: center; gap: 8px;
      width: 100%; max-width: 640px;
      margin-top: 10px; font-size: 15px; color: var(--muted); font-weight: 500;
    }
    #status-dot { background: var(--border); }

    #controls { width: 100%; max-width: 640px; margin-top: 10px; }
    #scan-btn {
      width: 100%; padding: 18px;
      font-size: 22px; font-weight: 700;
      background: var(--navy); color: var(--accent);
      border: none; border-radius: 14px;
      cursor: pointer; font-family: var(--font);
      transition: opacity 0.15s;
    }
    #scan-btn:hover:not(:disabled) { opacity: 0.88; }
    #scan-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #how-to {
      width: 100%; max-width: 640px; margin-top: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    #how-to p { font-size: 15px; color: var(--muted); margin: 0; line-height: 1.5; }
    #how-to p:first-child { font-size: 13px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.06em; }
    #how-to strong { color: var(--text); }

    #result-panel {
      display: none; width: 100%; max-width: 640px;
      margin-top: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px; gap: 8px; flex-direction: column;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    #result-panel.show { display: flex; }

    #scan-photo { width: 100%; border-radius: 10px; object-fit: cover; display: none; }
    #scan-photo.show { display: block; }

    #result-obj-name { font-size: 22px; font-weight: 700; color: var(--navy); text-transform: capitalize; }
    #result-instructions { font-size: 18px; color: var(--text); line-height: 1.65; }

    /* Instructions popup */
    #instr-popup {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center; padding: 20px;
    }
    #instr-popup.show { display: flex; }

    #instr-box {
      background: #fff; border-radius: 24px;
      padding: 36px 28px; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 16px;
      position: relative; box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }
    #instr-box h2 { font-size: 28px; font-weight: 700; color: var(--navy); text-transform: capitalize; }
    #instr-box p  { font-size: 22px; color: var(--muted); line-height: 1.7; }

    #close-instr {
      position: absolute; top: 14px; right: 14px;
      background: var(--bg); border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 22px;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      font-family: var(--font);
    }
    #close-instr:hover { background: var(--border); color: var(--text); }

    #speak-again-btn {
      padding: 14px; font-size: 17px; font-weight: 600;
      background: var(--navy); color: var(--yellow);
      border: none; border-radius: 12px; cursor: pointer;
      font-family: var(--font); transition: opacity 0.15s;
    }
    #speak-again-btn:hover { opacity: 0.88; }

    /* ── Med reminder banner ── */
    #med-reminder {
      display: none; width: 100%; max-width: 640px;
      margin-top: 10px; flex-shrink: 0;
      background: var(--navy); border: 2px solid var(--accent);
      border-radius: 14px; padding: 14px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    #med-reminder.show { display: block; }
    #med-reminder-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    #med-reminder-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    #med-reminder-names { font-size: 15px; font-weight: 600; color: #fff; }
    #med-taken-btn {
      padding: 12px 16px; font-size: 14px; font-weight: 700;
      background: var(--accent); color: var(--navy);
      border: none; border-radius: 10px; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
      font-family: var(--font); transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #med-taken-btn:active { opacity: 0.8; }

    /* ── Call / Message caretaker ── */
    .contact-btns { display: flex; gap: 8px; margin-left: auto; }
    .contact-btn {
      width: 38px; height: 38px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 20px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .contact-btn:hover { background: var(--border); }
    .contact-btn.contact-disabled { opacity: 0.35; pointer-events: none; }
    .contact-btn.contact-btn-danger { background: #b91c1c; border-color: #b91c1c; }
    .contact-btn.contact-btn-danger:hover { background: #991b1b; }

    /* ── Danger popup ── */
    #danger-popup {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(4px);
      z-index: 500; align-items: center; justify-content: center; padding: 24px;
    }
    #danger-popup.show { display: flex; }
    #danger-box {
      background: #fff; border-radius: 24px;
      padding: 36px 28px; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    #danger-icon  { font-size: 56px; line-height: 1; }
    #danger-title { font-size: 26px; font-weight: 800; color: #b91c1c; text-transform: uppercase; letter-spacing: 0.05em; }
    #danger-text  { font-size: 18px; color: #1f2937; line-height: 1.6; }
    #danger-instr { font-size: 15px; color: #7f1d1d; font-weight: 600; line-height: 1.5; }
    #danger-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 6px; }
    .danger-btn {
      display: flex; align-items: center; justify-content: center;
      padding: 16px; font-size: 18px; font-weight: 700;
      background: #b91c1c; color: #fff;
      border-radius: 14px; text-decoration: none;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .danger-btn:hover { opacity: 0.88; }
  </style>
</head>

<body>

  <div class="topbar">
    <h1>Object Scanner</h1>
    <div class="contact-btns">
      <a id="msg-caretaker-btn"  class="contact-btn" title="Message your caretaker">💬</a>
      <a id="call-caretaker-btn" class="contact-btn" title="Call your caretaker">📞</a>
    </div>
  </div>

  <!-- Danger popup (shown when AI detects a hazardous object) -->
  <div id="danger-popup">
    <div id="danger-box">
      <div id="danger-icon">⚠️</div>
      <h2 id="danger-title">Warning</h2>
      <p id="danger-text"></p>
      <p id="danger-instr"></p>
      <div id="danger-actions">
        <a id="danger-msg-btn"  class="danger-btn">💬 Message Caretaker</a>
        <a id="danger-call-btn" class="danger-btn">📞 Call Caretaker</a>
      </div>
    </div>
  </div>

  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
    <div id="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="scan-line"></div>
    </div>
    <div id="cam-start">
      <button id="start-btn">Start</button>
      <p>Allow camera access to start scanning</p>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Camera off</span>
  </div>

  <div id="controls">
    <button id="scan-btn" disabled>Scan Object</button>
  </div>

  <div id="med-reminder">
    <div id="med-reminder-inner">
      <div>
        <div id="med-reminder-label">💊 Time to take your meds</div>
        <div id="med-reminder-names"></div>
      </div>
      <button id="med-taken-btn">Meds Taken ✓</button>
    </div>
  </div>

  <div id="how-to">
    <p>How to use</p>
    <p>1. Tap <strong>Start</strong> and allow camera access.</p>
    <p>2. Point the camera at an object.</p>
    <p>3. Tap <strong>Scan Object</strong> — instructions appear and are read aloud.</p>
  </div>

  <div id="result-panel">
    <div id="result-obj-name"></div>
    <div id="result-instructions"></div>
  </div>

  <!-- Instructions popup -->
  <div id="instr-popup">
    <div id="instr-box">
      <button id="close-instr">×</button>
      <h2 id="instr-name"></h2>
      <p id="instr-text"></p>
      <button id="speak-again-btn">🔊 Speak again</button>
    </div>
  </div>

  <script src="phone.js"></script>
  <script>
    const STORAGE_KEY = 'accessibility_objects';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const camStart = document.getElementById('cam-start');
    const scanBtn = document.getElementById('scan-btn');
    const scanLine = document.getElementById('scan-line');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const resultPanel = document.getElementById('result-panel');
    const resultObjName = document.getElementById('result-obj-name');
    const resultInstructions = document.getElementById('result-instructions');
    const instrPopup = document.getElementById('instr-popup');
    const instrName = document.getElementById('instr-name');
    const instrText = document.getElementById('instr-text');
    const closeInstr = document.getElementById('close-instr');
    const speakAgainBtn = document.getElementById('speak-again-btn');
    let lastDataUrl = null;

    let lastDetections = [];
    let stream = null;
    let currentSpeakText = '';

    const msgs = {
      cameraOff:    'Camera off',
      ready:        'Point at an object and tap Scan',
      scanning:     'Scanning...',
      complete:     'Scan complete',
      noFrame:      'Could not capture frame',
      error:        'Error',
      notDetected:  'Try pointing the camera more directly at the object.',
      notSetUp:     'This object has not been set up by your caretaker yet.',
    };

    async function loadStatusTranslations() {
      const lang = localStorage.getItem('user_lang') || 'en';
      if (lang === 'en') return;
      const keys = Object.keys(msgs);
      const translated = await Promise.all(
        keys.map(k => fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(msgs[k])}`)
          .then(r => r.json()).then(d => d[0].map(x => x[0]).join('')).catch(() => msgs[k]))
      );
      keys.forEach((k, i) => { msgs[k] = translated[i]; });
    }

    function setStatus(text, mode) {
      statusText.textContent = text;
      statusDot.className = mode || '';
    }

    // ── Text to speech ────────────────────────────────────────────────────────
    function speak(text) {
      const userLang = localStorage.getItem('user_lang') || 'en';

      const translateAndSpeak = (textToSpeak) => {
        if (userLang === 'en') {
          speakWithTTS(textToSpeak);
        } else {
          fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${userLang}&dt=t&q=${encodeURIComponent(textToSpeak)}`)
            .then(r => r.json())
            .then(data => {
              const translated = data[0].map(x => x[0]).join('') || textToSpeak;
              currentSpeakText = translated;
              speakWithTTS(translated);
            })
            .catch(() => speakWithTTS(textToSpeak));
        }
      };

      // Use OpenAI TTS for all languages — it auto-detects language from the text
      function speakWithTTS(textToSay) {
        fetch('/api/tts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'tts-1',
            input: textToSay,
            voice: 'alloy'
          })
        })
          .then(r => r.blob())
          .then(blob => {
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play();
            currentSpeakText = textToSay;
          })
          .catch(e => console.error('TTS error:', e));
      }

      translateAndSpeak(text);
    }
    speakAgainBtn.addEventListener('click', () => { if (currentSpeakText) speak(currentSpeakText); });

    // ── Load caretaker objects (filtered by assignedTo) ───────────────────────
    function getCaretakerObjects() {
      try {
        const session = JSON.parse(localStorage.getItem('auth_session') || sessionStorage.getItem('auth_session') || 'null');
        const myUsername     = session ? session.username    : null;
        const caretakerName  = session ? session.caretakerName : null;
        const key = caretakerName ? ('objects_' + caretakerName) : STORAGE_KEY;
        const all = JSON.parse(localStorage.getItem(key) || '[]');
        return all.filter(obj =>
          !obj.assignedTo || obj.assignedTo === 'everyone' || obj.assignedTo === myUsername
        );
      } catch { return []; }
    }

    function checkMatches(detections) {
      const lc = detections.map(d => d.toLowerCase());
      const matches = [];
      for (const obj of getCaretakerObjects()) {
        if (lc.some(d => d.includes(obj.name.toLowerCase()) || obj.name.toLowerCase().includes(d))) {
          matches.push({ name: obj.name, instructions: obj.instructions });
        }
      }
      return matches;
    }

    // ── Overlay labels (tappable if instructions exist) ───────────────────────
    async function showOverlayLabels(matches) {
      overlay.innerHTML = '';
      if (!matches.length) return;
      const vw = video.offsetWidth;
      const vh = video.offsetHeight;
      const tapLabel = await translateForUser('tap for details');
      for (const m of matches) {
        const cx = vw * 0.5;
        const cy = vh * 0.38;

        const cs = getComputedStyle(document.documentElement);
        const accent = cs.getPropertyValue('--accent').trim() || '#facc15';
        const navy   = cs.getPropertyValue('--navy').trim()   || '#0f1f4a';

        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
        dot.setAttribute('r', 8); dot.setAttribute('fill', accent);
        dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', 2);
        overlay.appendChild(dot);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', cx); line.setAttribute('y1', cy - 8);
        line.setAttribute('x2', cx); line.setAttribute('y2', cy - 40);
        line.setAttribute('stroke', accent); line.setAttribute('stroke-width', 2);
        overlay.appendChild(line);

        const bw = 180, bh = m.instructions ? 70 : 46;
        const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
        fo.setAttribute('x', cx - bw / 2);
        fo.setAttribute('y', cy - 40 - bh);
        fo.setAttribute('width', bw);
        fo.setAttribute('height', bh);

        const hasInstr = !!m.instructions;
        const bubbleName = await translateForUser(m.name);
        fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" style="background:${navy};border:1.5px solid ${accent};border-radius:12px;padding:8px 12px;pointer-events:all;cursor:pointer;" onclick="${hasInstr ? `showInstructions('${m.name.replace(/'/g, "\\'")}','${m.instructions.replace(/'/g, "\\'")}')` : `speak('${m.name.replace(/'/g, "\\'")}')`}">
          <div style="color:${accent};font-size:14px;font-weight:700;text-align:center;">${bubbleName}</div>
          ${hasInstr ? `<div style="margin-top:4px;font-size:10px;color:#aaa;text-align:center;">${tapLabel}</div>` : ''}
        </div>`;
        overlay.appendChild(fo);
      }
    }

    // ── Translation helper ────────────────────────────────────────────────────
    function translateForUser(text) {
      const lang = localStorage.getItem('user_lang') || 'en';
      if (lang === 'en') return Promise.resolve(text);
      return fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`)
        .then(r => r.json())
        .then(d => d[0].map(x => x[0]).join('') || text)
        .catch(() => text);
    }

    // ── Instructions popup ────────────────────────────────────────────────────
    async function showInstructions(name, instructions) {
      instrPopup.classList.add('show');
      instrName.textContent = name;
      instrText.textContent = instructions;
      const [tName, tInstr] = await Promise.all([
        translateForUser(name),
        translateForUser(instructions),
      ]);
      instrName.textContent = tName;
      instrText.textContent = tInstr;
      speak(name + '. ' + instructions);
    }

    closeInstr.addEventListener('click', () => instrPopup.classList.remove('show'));
    instrPopup.addEventListener('click', e => { if (e.target === instrPopup) instrPopup.classList.remove('show'); });


    // ── Camera ────────────────────────────────────────────────────────────────
    startBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        camStart.style.display = 'none';
        scanBtn.disabled = false;
        setStatus(msgs.ready, 'active');
      } catch (e) {
        camStart.querySelector('p').textContent = 'Camera access denied. Check browser permissions.';
      }
    });

    function captureFrame() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(video, 0, 0, w, h);
      return canvas.toDataURL('image/jpeg', 0.8);
    }

    // ── Scan ──────────────────────────────────────────────────────────────────
    scanBtn.addEventListener('click', async () => {
      if (!stream) return;
      scanBtn.disabled = true;
      scanLine.classList.add('active');
      setStatus(msgs.scanning, 'scanning');
      overlay.innerHTML = '';
      let dataUrl, base64;
      try {
        dataUrl = captureFrame();
        lastDataUrl = dataUrl;
        base64 = dataUrl.split(',')[1];
      }
      catch (e) { setStatus(msgs.noFrame, ''); scanBtn.disabled = false; scanLine.classList.remove('active'); return; }

      resultPanel.className = 'show';
      translateForUser('Scanning...').then(t => { resultObjName.textContent = t; });
      resultInstructions.textContent = '';

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 500,
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64}` } },
                { type: 'text', text: 'You are an accessibility assistant helping an elderly user safely identify everyday objects. Identify ONLY the single most prominent object — the one closest to the camera or most centered in the frame. Ignore background objects. Then decide: can this object cause harm to an elderly person if mishandled (e.g. knives, scissors, toxic chemicals, medications, hot surfaces, firearms)? Respond ONLY with raw JSON: {"objects": ["name of object"], "description": "one friendly sentence about that object", "danger": true or false, "dangerReason": "short one-sentence safety warning if danger is true, otherwise empty string"}' }
              ]
            }]
          })
        });

        const data = await resp.json();
        const text = data.choices?.[0]?.message?.content || '';
        let parsed;
        try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
        catch (e) { parsed = { objects: [], description: text }; }

        lastDetections = parsed.objects || [];
        const matches = checkMatches(lastDetections);
        showOverlayLabels(matches);

        if (parsed.danger) {
          showDangerPopup(lastDetections[0] || (matches[0] && matches[0].name) || '', parsed.dangerReason || '');
        }

        if (matches.length) {
          const withInstr = matches.find(m => m.instructions);
          translateForUser(matches[0].name).then(t => { resultObjName.textContent = t; });
          if (withInstr) {
            translateForUser(withInstr.instructions).then(t => { resultInstructions.textContent = t; });
            showInstructions(withInstr.name, withInstr.instructions);
          } else {
            translateForUser('No instructions saved for this object.').then(t => { resultInstructions.textContent = t; });
            speak(matches[0].name);
          }
        } else if (lastDetections.length) {
          translateForUser(lastDetections[0]).then(t => { resultObjName.textContent = t; });
          translateForUser('This object has not been set up by your caretaker yet.').then(t => { resultInstructions.textContent = t; });
          speak(lastDetections[0]);
        } else {
          translateForUser('Nothing detected').then(t => { resultObjName.textContent = t; });
          translateForUser('Try pointing the camera more directly at the object.').then(t => { resultInstructions.textContent = t; });
        }

        setStatus(msgs.complete, 'active');
      } catch (e) {
        translateForUser('Scan failed').then(t => { resultObjName.textContent = t; });
        translateForUser('Please check your connection and try again.').then(t => { resultInstructions.textContent = t; });
        console.error(e);
        setStatus(msgs.error, '');
      }

      scanLine.classList.remove('active');
      scanBtn.disabled = false;
    });

    // ── UI translation ────────────────────────────────────────────────────────
    function translateUI() {
      const lang = localStorage.getItem('user_lang') || 'en';
      if (lang === 'en') return;

      const items = [
        { el: document.querySelector('.topbar h1'),    text: 'Object Scanner' },
        { el: startBtn,                                text: 'Start' },
        { el: scanBtn,                                 text: 'Scan Object' },
        { el: document.querySelector('#cam-start p'),  text: 'Allow camera access to start scanning' },
        { el: speakAgainBtn,                           text: '🔊 Speak again' },
      ];

      const howToSteps = [
        { el: document.querySelector('#how-to p:nth-child(1)'), text: 'How to use' },
        { el: document.querySelector('#how-to p:nth-child(2)'), text: '1. Tap Enable Camera and allow access.' },
        { el: document.querySelector('#how-to p:nth-child(3)'), text: '2. Point the camera at an object.' },
        { el: document.querySelector('#how-to p:nth-child(4)'), text: '3. Tap Scan Object — instructions will appear and be read aloud.' },
      ];

      [...items, ...howToSteps].forEach(({ el, text }) => {
        if (!el) return;
        fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`)
          .then(r => r.json())
          .then(data => { el.textContent = data[0].map(x => x[0]).join('') || text; })
          .catch(() => {});
      });

    }

    async function initUserTranslations() {
      await loadStatusTranslations();
      setStatus(msgs.cameraOff, '');
      translateUI();
    }

    initUserTranslations();

    // ── Caretaker contact buttons (Call / Message) ────────────────────────────
    async function setupCaretakerContact() {
      const msgBtn  = document.getElementById('msg-caretaker-btn');
      const callBtn = document.getElementById('call-caretaker-btn');
      try {
        const session  = JSON.parse(localStorage.getItem('auth_session') || sessionStorage.getItem('auth_session') || 'null');
        const allUsers = JSON.parse(localStorage.getItem('auth_users') || '[]');
        const me       = session ? allUsers.find(u => u.username === session.username) : null;

        // Find caretaker by any link: assignedTo, caretakerName on user record, or caretakerName in session
        const ctUsername = (me && me.assignedTo)
          || (me && me.caretakerName)
          || (session && session.caretakerName);
        const caretaker = ctUsername ? allUsers.find(u => u.username === ctUsername) : null;
        let phone = '';
        if (caretaker && caretaker.phone) {
          // Decrypt if stored encrypted (contains ':'), otherwise use as-is
          phone = caretaker.phone.includes(':')
            ? (await decryptPhone(caretaker.phone) || '')
            : caretaker.phone;
        }

        if (phone) {
          msgBtn.href  = `sms:${phone}`;
          callBtn.href = `tel:${phone}`;
          msgBtn.classList.remove('contact-disabled');
          callBtn.classList.remove('contact-disabled');
        } else {
          msgBtn.classList.add('contact-disabled');
          callBtn.classList.add('contact-disabled');
          msgBtn.title  = caretaker ? 'Caretaker has no phone number set' : 'No caretaker linked';
          callBtn.title = caretaker ? 'Caretaker has no phone number set' : 'No caretaker linked';
        }
      } catch {}
    }
    setupCaretakerContact();

    // ── Danger popup ──────────────────────────────────────────────────────────
    async function showDangerPopup(objectName, reason) {
      const popup   = document.getElementById('danger-popup');
      const textEl  = document.getElementById('danger-text');
      const instrEl = document.getElementById('danger-instr');
      const msgBtn  = document.getElementById('danger-msg-btn');
      const callBtn = document.getElementById('danger-call-btn');
      const topMsg  = document.getElementById('msg-caretaker-btn');
      const topCall = document.getElementById('call-caretaker-btn');

      const baseText = reason
        ? (objectName ? `${objectName}: ${reason}` : reason)
        : `${objectName || 'This object'} may be dangerous. Please be careful.`;

      const [tText, tInstr] = await Promise.all([
        translateForUser(baseText),
        translateForUser('Please message or call your caretaker before touching this object.'),
      ]);
      textEl.textContent  = tText;
      instrEl.textContent = tInstr;

      if (topMsg.href)  msgBtn.href  = topMsg.href;  else msgBtn.removeAttribute('href');
      if (topCall.href) callBtn.href = topCall.href; else callBtn.removeAttribute('href');

      popup.classList.add('show');
      speak('Warning! ' + tText);
    }

    document.getElementById('danger-msg-btn').addEventListener('click',  () => document.getElementById('danger-popup').classList.remove('show'));
    document.getElementById('danger-call-btn').addEventListener('click', () => document.getElementById('danger-popup').classList.remove('show'));
  </script>

  <script>
  // ── Medication reminder ──────────────────────────────────────────────────────
  (function () {
    const LOW_STOCK = 7;
    if (Notification.permission === 'default') Notification.requestPermission();

    // Clean up taken records from previous days
    const todayStr = new Date().toISOString().split('T')[0];
    try {
      const taken = JSON.parse(localStorage.getItem('med_doses_taken') || '{}');
      const cleaned = {};
      Object.entries(taken).forEach(([k, v]) => { if (v === todayStr) cleaned[k] = v; });
      localStorage.setItem('med_doses_taken', JSON.stringify(cleaned));
    } catch {}

    function isTimeDue(schedTime, nowMins) {
      const [h, m] = schedTime.split(':').map(Number);
      const schedMins = h * 60 + m;
      return nowMins >= schedMins && nowMins < schedMins + 5;
    }

    let pendingDoses = [];

    function checkMedReminders() {
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];

      let session;
      try { session = JSON.parse(localStorage.getItem('auth_session') || sessionStorage.getItem('auth_session') || 'null'); } catch { session = null; }
      const myUsername = session ? session.username : null;

      let meds, taken;
      try {
        const allMeds = JSON.parse(localStorage.getItem('medications_active') || '[]');
        meds = allMeds.filter(m => !m.assignedTo || m.assignedTo === 'everyone' || m.assignedTo === myUsername);
      } catch { meds = []; }
      try { taken = JSON.parse(localStorage.getItem('med_doses_taken')    || '{}'); } catch { taken = {}; }

      const due = [];
      for (const med of meds) {
        if (!med.times || !med.days || !med.days.includes(dayName)) continue;
        for (const time of med.times) {
          const key = `${med.id}_${time}`;
          if (taken[key] === today) continue;
          if (isTimeDue(time, nowMins)) due.push({ med, time, key });
        }
      }

      pendingDoses = due;
      updateReminderUI(due);

      if (due.length > 0) {
        const newDue = due.filter(d => !sessionStorage.getItem('notif_' + d.key));
        if (newDue.length > 0) {
          newDue.forEach(d => sessionStorage.setItem('notif_' + d.key, '1'));
          if (Notification.permission === 'granted') {
            const names = [...new Set(newDue.map(d => d.med.name))].join(', ');
            new Notification('Time to take your medication', { body: names });
          }
        }
      }
    }

    function updateReminderUI(due) {
      const banner = document.getElementById('med-reminder');
      const namesEl = document.getElementById('med-reminder-names');
      if (!banner || !namesEl) return;
      if (due.length === 0) { banner.classList.remove('show'); return; }
      banner.classList.add('show');
      namesEl.textContent = [...new Set(due.map(d => d.med.name))].join(' · ');
    }

    document.getElementById('med-taken-btn').addEventListener('click', () => {
      if (!pendingDoses.length) return;
      const today = new Date().toISOString().split('T')[0];
      let meds, taken;
      try { meds  = JSON.parse(localStorage.getItem('medications_active') || '[]'); } catch { meds  = []; }
      try { taken = JSON.parse(localStorage.getItem('med_doses_taken')    || '{}'); } catch { taken = {}; }

      const deductedIds = new Set();
      const lowMeds = [];

      pendingDoses.forEach(({ med, key }) => {
        taken[key] = today;
        if (!deductedIds.has(med.id)) {
          deductedIds.add(med.id);
          const idx = meds.findIndex(m => m.id === med.id);
          if (idx !== -1 && typeof meds[idx].pillCount === 'number') {
            meds[idx].pillCount = Math.max(0, meds[idx].pillCount - 1);
            if (meds[idx].pillCount <= LOW_STOCK) lowMeds.push(meds[idx]);
          }
        }
      });

      localStorage.setItem('medications_active', JSON.stringify(meds));
      localStorage.setItem('med_doses_taken', JSON.stringify(taken));

      if (lowMeds.length && Notification.permission === 'granted') {
        let notified;
        try { notified = JSON.parse(localStorage.getItem('med_low_notified') || '{}'); } catch { notified = {}; }
        lowMeds.forEach(med => {
          if (notified[med.id] !== today) {
            notified[med.id] = today;
            new Notification('Caretaker: Low Medication Stock', {
              body: `${med.name} is running low (${med.pillCount} pill${med.pillCount !== 1 ? 's' : ''} left). Please restock.`,
            });
          }
        });
        localStorage.setItem('med_low_notified', JSON.stringify(notified));
      }

      pendingDoses = [];
      updateReminderUI([]);
    });

    checkMedReminders();
    setInterval(checkMedReminders, 60000);
  })();
  </script>

  <script src="side-panel.js"></script>
