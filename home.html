<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessibility Scanner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #ffffff;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 0;
    }

    .logo {
      font-size: 15px;
      font-weight: 500;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      text-align: center;
      margin-bottom: 36px;
    }

    /* language selectors */
    .lang-selectors {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lang-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .lang-group label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .lang-group select {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .lang-group select:focus {
      outline: none;
      border-color: #4ade80;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-radius: 14px;
      border: 1px solid #222;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .btn-label {
      font-size: 18px;
      font-weight: 600;
    }

    .btn-desc {
      font-size: 13px;
      opacity: 0.5;
    }

    .btn-arrow {
      font-size: 20px;
      opacity: 0.3;
    }

    .btn-user {
      background: #0a2070;
      border-color: #0a2070;
      color: #faf9f9;
    }

    .btn-user:hover {
      background: #142054;
      border-color: #142054;
    }

    .btn-user .btn-arrow {
      color: #000;
    }

    .btn-caretaker {
      background: #1a1a1a;
      color: #f0f0f0;
    }

    .btn-caretaker:hover {
      background: #222;
      border-color: #444;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>

<body>

  <p class="logo" id="logo-text">Accessibility App</p>
  <h1 id="title-text">Who are you?</h1>
  <p class="subtitle" id="subtitle-text">Choose your role to get started</p>

  <!-- Language selectors -->
  <div class="lang-selectors">
    <div class="lang-group">
      <label id="ct-lang-label">Caretaker language</label>
      <select id="caretaker-lang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="bn">Bengali</option>
        <option value="ur">Urdu</option>
        <option value="ru">Russian</option>
        <option value="tr">Turkish</option>
        <option value="vi">Vietnamese</option>
        <option value="th">Thai</option>
        <option value="pl">Polish</option>
        <option value="nl">Dutch</option>
        <option value="sv">Swedish</option>
        <option value="ro">Romanian</option>
        <option value="el">Greek</option>
        <option value="he">Hebrew</option>
        <option value="fa">Persian</option>
        <option value="sw">Swahili</option>
        <option value="tl">Filipino</option>
        <option value="ms">Malay</option>
        <option value="id">Indonesian</option>
      </select>
    </div>
    <div class="lang-group">
      <label id="user-lang-label">User language</label>
      <select id="user-lang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="bn">Bengali</option>
        <option value="ur">Urdu</option>
        <option value="ru">Russian</option>
        <option value="tr">Turkish</option>
        <option value="vi">Vietnamese</option>
        <option value="th">Thai</option>
        <option value="pl">Polish</option>
        <option value="nl">Dutch</option>
        <option value="sv">Swedish</option>
        <option value="ro">Romanian</option>
        <option value="el">Greek</option>
        <option value="he">Hebrew</option>
        <option value="fa">Persian</option>
        <option value="sw">Swahili</option>
        <option value="tl">Filipino</option>
        <option value="ms">Malay</option>
        <option value="id">Indonesian</option>
      </select>
    </div>
  </div>

  <div class="btn-group">
  <a href="user.html" class="btn btn-user">
      <div class="btn-left">
        <span class="btn-label" id="user-btn-label">I am a User</span>
        <span class="btn-desc" id="user-btn-desc">Scan objects around me</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>
    <a href="caretaker.html" class="btn btn-caretaker">
      <div class="btn-left">
        <span class="btn-label" id="ct-btn-label">I am a Caretaker</span>
        <span class="btn-desc" id="ct-btn-desc">Manage objects &amp; instructions</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <p class="footer" id="footer-text">Select the option that applies to you</p>

  <script>
    const ctLangSel = document.getElementById('caretaker-lang');
    const userLangSel = document.getElementById('user-lang');

    // load saved
    ctLangSel.value = localStorage.getItem('caretaker_lang') || 'en';
    userLangSel.value = localStorage.getItem('user_lang') || 'en';

    // translate a piece of text using Google Translate free endpoint
    function translateText(text, targetLang) {
      if (targetLang === 'en') return Promise.resolve(text);
      return fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`)
        .then(r => r.json())
        .then(data => data[0].map(x => x[0]).join(''))
        .catch(() => text);
    }

    // translate all caretaker-facing text
    async function translatePage(ctLang, userLang) {
      // caretaker language texts
      const ctTexts = [
        { id: 'logo-text', en: 'Accessibility App' },
        { id: 'title-text', en: 'Who are you?' },
        { id: 'subtitle-text', en: 'Choose your role to get started' },
        { id: 'ct-lang-label', en: 'Caretaker language' },
        { id: 'user-lang-label', en: 'User language' },
        { id: 'ct-btn-label', en: 'I am a Caretaker' },
        { id: 'ct-btn-desc', en: 'Manage objects & instructions' },
        { id: 'footer-text', en: 'Select the option that applies to you' },
      ];

      for (const item of ctTexts) {
        const translated = await translateText(item.en, ctLang);
        document.getElementById(item.id).textContent = translated;
      }

      // user button in user language
      const userBtnLabel = await translateText('I am a User', userLang);
      const userBtnDesc = await translateText('Scan objects around me', userLang);
      document.getElementById('user-btn-label').textContent = userBtnLabel;
      document.getElementById('user-btn-desc').textContent = userBtnDesc;
    }

    // run on load
    translatePage(ctLangSel.value, userLangSel.value);

    // run when changed
    ctLangSel.addEventListener('change', () => {
      localStorage.setItem('caretaker_lang', ctLangSel.value);
      translatePage(ctLangSel.value, userLangSel.value);
    });

    userLangSel.addEventListener('change', () => {
      localStorage.setItem('user_lang', userLangSel.value);
      translatePage(ctLangSel.value, userLangSel.value);
    });
  </script>
</body>

</html>
