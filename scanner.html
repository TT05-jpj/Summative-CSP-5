<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caretaker Scanner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #dbeafe;
      color: #03114F;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      margin-bottom: 16px;
      gap: 12px;
      background: #142054;
      position: relative;
    }

    .back-btn {
      background: none;
      border: none;
      color: #aab0cc;
      font-size: 27px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    .back-btn:hover {
      color: #fff;
    }

    .topbar h1 {
      font-size: 21px;
      font-weight: 500;
      color: #fff;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .dashboard-btn {
      padding: 7px 14px;
      font-size: 16px;
      font-weight: 500;
      background: #ffffff;
      color: #03114F;
      border: 1px solid #0a2070;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .dashboard-btn:hover {
      background: #e8e8e8;
      color: #03114F;
      border-color: #0a2070;
    }

    #cam-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 1100px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      border: 1px solid #0a2070;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas {
      display: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* dashboard icon button ON the camera */
    #cam-dashboard-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(20, 32, 84, 0.85);
      border: 1px solid #0a2070;
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
      text-decoration: none;
      display: none;
    }

    #cam-dashboard-btn:hover {
      background: rgba(20, 32, 84, 1);
      color: #ffffff;
    }

    #cam-dashboard-btn.visible {
      display: block;
    }

    #scan-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #scan-frame .corner {
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: #facc15;
      border-style: solid;
      border-width: 0;
    }

    #scan-frame .tl {
      top: 20px;
      left: 20px;
      border-top-width: 3px;
      border-left-width: 3px;
      border-top-left-radius: 4px;
    }

    #scan-frame .tr {
      top: 20px;
      right: 20px;
      border-top-width: 3px;
      border-right-width: 3px;
      border-top-right-radius: 4px;
    }

    #scan-frame .bl {
      bottom: 20px;
      left: 20px;
      border-bottom-width: 3px;
      border-left-width: 3px;
      border-bottom-left-radius: 4px;
    }

    #scan-frame .br {
      bottom: 20px;
      right: 20px;
      border-bottom-width: 3px;
      border-right-width: 3px;
      border-bottom-right-radius: 4px;
    }

    #scan-line {
      position: absolute;
      left: 20px;
      right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #facc15, transparent);
      top: 20px;
      display: none;
      animation: scandown 1.5s ease-in-out infinite;
    }

    @keyframes scandown {
      0% {
        top: 20px;
        opacity: 1;
      }

      90% {
        top: calc(100% - 22px);
        opacity: 1;
      }

      100% {
        top: calc(100% - 22px);
        opacity: 0;
      }
    }

    #scan-line.active {
      display: block;
    }

    #cam-start {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #03114F;
    }

    #cam-start p {
      font-size: 16px;
      color: #aab0cc;
      text-align: center;
      max-width: 240px;
    }

    #start-btn {
      padding: 10px 24px;
      font-size: 18px;
      font-weight: 500;
      background: #ffffff;
      color: #03114F;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #start-btn:hover {
      background: #e8e8e8;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 1100px;
      margin-top: 12px;
      font-size: 16px;
      color: #03114F;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0a2070;
      flex-shrink: 0;
    }

    #status-dot.active {
      background: #facc15;
    }

    #status-dot.scanning {
      background: #facc15;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    #controls {
      width: 100%;
      max-width: 1100px;
      margin-top: 12px;
    }

    #scan-btn {
      width: 100%;
      padding: 14px;
      font-size: 19px;
      font-weight: 500;
      background: #142054;
      color: #fff;
      border: 1px solid #0a2070;
      border-radius: 12px;
      cursor: pointer;
    }

    #scan-btn:hover:not(:disabled) {
      border-color: #facc15;
      color: #facc15;
    }

    #scan-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #result-panel {
      display: none;
      width: 100%;
      max-width: 1100px;
      margin-top: 14px;
      background: #2254c5;
      border: 1px solid #0a2070;
      border-radius: 12px;
      padding: 16px;
      gap: 12px;
      flex-direction: column;
    }

    #result-panel.show {
      display: flex;
    }

    #detected-text {
      font-size: 18px;
      color: #fff;
    }

    #ai-result {
      font-size: 16px;
      color: #aab0cc;
      line-height: 1.5;
    }

    .field-label {
      font-size: 15px;
      color: #aab0cc;
      margin-bottom: 5px;
    }

    #label-row {
      display: flex;
      gap: 8px;
    }

    #label-input {
      flex: 1;
      padding: 8px 12px;
      font-size: 16px;
      background: #020d3a;
      border: 1px solid #0a2070;
      border-radius: 8px;
      color: #f0f0f0;
      outline: none;
    }

    #label-input:focus {
      border-color: #2254c5;
    }

    #instr-input {
      width: 100%;
      padding: 8px 12px;
      font-size: 16px;
      background: #020d3a;
      border: 1px solid #0a2070;
      border-radius: 8px;
      color: #f0f0f0;
      outline: none;
      font-family: inherit;
      resize: vertical;
      min-height: 70px;
    }

    #instr-input:focus {
      border-color: #2254c5;
    }

    #save-btn {
      padding: 8px 16px;
      font-size: 16px;
      font-weight: 500;
      background: #ffffff;
      color: #03114F;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }

    #save-btn:hover {
      background: #e8e8e8;
    }

    #saved-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #142054;
      border: 1px solid #0a2070;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 15px;
      color: #aab0cc;
    }

    .pill strong {
      font-weight: 500;
      color: #fff;
    }

    #save-confirm {
      font-size: 16px;
      color: #facc15;
      display: none;
    }

    #save-confirm.show {
      display: block;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='home.html'">← Home</button>
    <h1>Caretaker Scanner</h1>
    <div style="flex:1"></div>
    <a href="caretaker.html" class="dashboard-btn">Dashboard →</a>
  </div>

  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
    <div id="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="scan-line"></div>
    </div>
    <a href="caretaker.html" id="cam-dashboard-btn">📋 All saved objects</a>
    <div id="cam-start">
      <button id="start-btn">Enable Camera</button>
      <p>Allow camera access to start scanning</p>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Camera off</span>
  </div>

  <div id="controls">
    <button id="scan-btn" disabled>Scan Object</button>
  </div>

  <div id="result-panel">
    <div id="detected-text"></div>
    <div id="ai-result"></div>

    <div>
      <p class="field-label">Object name</p>
      <div id="label-row">
        <input id="label-input" type="text" placeholder='e.g. "pill bottle"' />
      </div>
    </div>

    <div>
      <p class="field-label">Instructions for user (optional)</p>
      <textarea id="instr-input" placeholder='e.g. "Take one tablet with water every morning."'></textarea>
    </div>

    <button id="save-btn">Save Object</button>
    <div id="save-confirm">✓ Saved! User will see this when they scan it.</div>
    <div id="saved-labels"></div>
  </div>

  <script>
    const API_KEY = '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'; // paste your OpenAI key here
    const STORAGE_KEY = 'accessibility_objects';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const camStart = document.getElementById('cam-start');
    const scanBtn = document.getElementById('scan-btn');
    const scanLine = document.getElementById('scan-line');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const resultPanel = document.getElementById('result-panel');
    const detectedText = document.getElementById('detected-text');
    const aiResult = document.getElementById('ai-result');
    const labelInput = document.getElementById('label-input');
    const instrInput = document.getElementById('instr-input');
    const saveBtn = document.getElementById('save-btn');
    const savedLabelsDiv = document.getElementById('saved-labels');
    const saveConfirm = document.getElementById('save-confirm');
    const camDashBtn = document.getElementById('cam-dashboard-btn');

    let lastDetections = [];
    let stream = null;
    let capturedPhotoURL = null;

    function setStatus(text, mode) {
      statusText.textContent = text;
      statusDot.className = mode || '';
    }

    function getObjects() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveObjects(objects) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(objects));
    }

    function renderSavedPills() {
      const objects = getObjects();
      savedLabelsDiv.innerHTML = '';
      for (const s of objects) {
        const pill = document.createElement('div');
        pill.className = 'pill';
        pill.innerHTML = `<strong>${s.name}</strong>${s.instructions ? `<span>${s.instructions.slice(0, 30)}...</span>` : ''}`;
        savedLabelsDiv.appendChild(pill);
      }
    }

    function showOverlayLabels(matches) {
      overlay.innerHTML = '';
      if (!matches.length) return;
      const vw = video.offsetWidth;
      const vh = video.offsetHeight;
      matches.forEach((m, i) => {
        const cx = vw * (0.3 + i * 0.25);
        const cy = vh * 0.4;
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
        dot.setAttribute('r', 7); dot.setAttribute('fill', '#facc15');
        dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', 2);
        overlay.appendChild(dot);
        const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
        fo.setAttribute('x', cx - 70); fo.setAttribute('y', cy - 52);
        fo.setAttribute('width', 140); fo.setAttribute('height', 36);
        fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.85);color:#facc15;font-size:13px;font-weight:600;padding:5px 10px;border-radius:14px;text-align:center;border:1px solid #facc15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">✓ ${m.name}</div>`;
        overlay.appendChild(fo);
      });
    }

    function checkMatches(detections) {
      const lc = detections.map(d => d.toLowerCase());
      return getObjects().filter(obj =>
        lc.some(d => d.includes(obj.name.toLowerCase()) || obj.name.toLowerCase().includes(d))
      );
    }

    startBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        camStart.style.display = 'none';
        scanBtn.disabled = false;
        camDashBtn.classList.add('visible');
        setStatus('Point at an object and tap Scan', 'active');
        renderSavedPills();
      } catch (e) {
        camStart.querySelector('p').textContent = 'Camera access denied. Check browser permissions.';
      }
    });

    function captureFrame() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(video, 0, 0, w, h);
      const dataURL = canvas.toDataURL('image/jpeg', 0.8);
      capturedPhotoURL = dataURL;
      return dataURL.split(',')[1];
    }

    scanBtn.addEventListener('click', async () => {
      if (!stream) return;
      scanBtn.disabled = true;
      scanLine.classList.add('active');
      setStatus('Scanning...', 'scanning');
      overlay.innerHTML = '';
      saveConfirm.className = '';

      let base64;
      try { base64 = captureFrame(); }
      catch (e) { setStatus('Could not capture frame', ''); scanBtn.disabled = false; scanLine.classList.remove('active'); return; }

      resultPanel.className = 'show';
      detectedText.innerHTML = 'Analyzing...';
      aiResult.textContent = '';
      labelInput.value = '';
      instrInput.value = '';

      try {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 500,
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64}` } },
                { type: 'text', text: 'You are an accessibility assistant. Identify ONLY the single most prominent object — the one closest to the camera or most centered in the frame. Ignore background objects. Respond ONLY with raw JSON: {"objects": ["name of object"], "description": "one friendly sentence about that object"}' }
              ]
            }]
          })
        });

        const data = await resp.json();
        const text = data.choices?.[0]?.message?.content || '';
        let parsed;
        try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
        catch (e) { parsed = { objects: [], description: text }; }

        lastDetections = parsed.objects || [];
        const matches = checkMatches(lastDetections);
        showOverlayLabels(matches);

        const objList = lastDetections.length ? lastDetections.join(', ') : 'nothing detected';
        detectedText.innerHTML = `<strong>Detected:</strong> ${objList}`;
        if (matches.length) {
          detectedText.innerHTML += `<br><span style="color:#facc15">✓ Already saved: ${matches.map(m => m.name).join(', ')}</span>`;
        }
        aiResult.textContent = parsed.description || '';
        if (lastDetections.length) labelInput.value = lastDetections[0];
        setStatus('Scan complete — add a label and save', 'active');

      } catch (e) {
        detectedText.innerHTML = '<span style="color:#f87171">Scan failed — check your API key</span>';
        console.error(e);
        setStatus('Error', '');
      }

      scanLine.classList.remove('active');
      scanBtn.disabled = false;
    });

    saveBtn.addEventListener('click', () => {
      const name = labelInput.value.trim();
      if (!name) { labelInput.focus(); return; }
      const instructions = instrInput.value.trim();
      const objects = getObjects();
      const existing = objects.findIndex(o => o.name.toLowerCase() === name.toLowerCase());
      if (existing >= 0) {
        objects[existing] = { name, instructions };
      } else {
        objects.push({ name, instructions });
      }
      saveObjects(objects);

      if (capturedPhotoURL) {
        const photos = JSON.parse(localStorage.getItem('scanner-photos') || '{}');
        photos[name.toLowerCase()] = capturedPhotoURL;
        localStorage.setItem('scanner-photos', JSON.stringify(photos));
      }

      labelInput.value = '';
      instrInput.value = '';
      saveConfirm.className = 'show';
      renderSavedPills();
      setTimeout(() => saveConfirm.className = '', 3000);
    });

    labelInput.addEventListener('keydown', e => { if (e.key === 'Enter') instrInput.focus(); });
  </script>
</body>

</html>
