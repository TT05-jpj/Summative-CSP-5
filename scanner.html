<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caretaker Scanner</title>
  <style>
    body {
  font-family: system-ui, sans-serif;
  background: #f9ead9;
  color: #f0f0f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
}

.topbar {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 900px;
  margin-bottom: 20px;
  gap: 16px;
}

.back-btn {
  background: none;
  border: none;
  color: #03114F;
  font-size: 32px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}

.back-btn:hover { color: #142054; }

.topbar h1 {
  font-size: 26px;
  font-weight: 600;
  color: #03114F;
  flex: 1;
}

.dashboard-btn {
  padding: 12px 22px;
  font-size: 17px;
  font-weight: 500;
  background: #142054;
  color: #f9ead9;
  border: 1px solid #0a2070;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
}

.dashboard-btn:hover {
  background: #0a2070;
  color: #fff;
  border-color: #1a3a9a;
}

#cam-wrap {
  position: relative;
  width: 100%;
  max-width: 900px;
  border-radius: 18px;
  overflow: hidden;
  background: #000;
  aspect-ratio: 4/3;
  border: 1px solid #0a2070;
}

#status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 900px;
  margin-top: 14px;
  font-size: 18px;
  color: #03114F;
}

#status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #aab0cc;
  flex-shrink: 0;
}

#status-dot.active   { background: #142054; }
#status-dot.scanning { background: #0a2070; animation: pulse 1s infinite; }

#controls {
  width: 100%;
  max-width: 900px;
  margin-top: 14px;
}

#scan-btn {
  width: 100%;
  padding: 20px;
  font-size: 20px;
  font-weight: 500;
  background: #142054;
  color: #f9ead9;
  border: 1px solid #0a2070;
  border-radius: 14px;
  cursor: pointer;
}

#scan-btn:hover:not(:disabled) {
  border-color: #f9ead9;
  color: #fff;
  background: #0a2070;
}

#scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

#result-panel {
  display: none;
  width: 100%;
  max-width: 900px;
  margin-top: 16px;
  background: #142054;
  border: 1px solid #0a2070;
  border-radius: 14px;
  padding: 22px;
  gap: 14px;
  flex-direction: column;
}

#result-panel.show { display: flex; }

#detected-text {
  font-size: 20px;
  color: #f0f0f0;
}

#ai-result {
  font-size: 18px;
  color: #aab0cc;
  line-height: 1.6;
}

.field-label {
  font-size: 16px;
  color: #aab0cc;
  margin-bottom: 6px;
}

#label-row {
  display: flex;
  gap: 10px;
}

#label-input {
  flex: 1;
  padding: 12px 16px;
  font-size: 17px;
  background: #020d3a;
  border: 1px solid #0a2070;
  border-radius: 10px;
  color: #f0f0f0;
  outline: none;
}

#label-input:focus { border-color: #f9ead9; }

#instr-input {
  width: 100%;
  padding: 12px 16px;
  font-size: 17px;
  background: #020d3a;
  border: 1px solid #0a2070;
  border-radius: 10px;
  color: #f0f0f0;
  outline: none;
  font-family: inherit;
  resize: vertical;
  min-height: 90px;
}

#instr-input:focus { border-color: #f9ead9; }

#save-btn {
  padding: 12px 24px;
  font-size: 17px;
  font-weight: 500;
  background: #f9ead9;
  color: #03114F;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
  align-self: flex-end;
}

#save-btn:hover { background: #f0ddc8; }

.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #0a2070;
  border: 1px solid #1a3a9a;
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 15px;
  color: #aab0cc;
}

.pill strong {
  font-weight: 500;
  color: #f9ead9;
}

#save-confirm {
  font-size: 17px;
  color: #f9ead9;
  display: none;
}

#save-confirm.show { display: block; }

#cam-start {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: #142054;
  border-radius: 18px;
  z-index: 5;
}

#cam-start p {
  font-size: 18px;
  color: #aab0cc;
  text-align: center;
  max-width: 300px;
}

#start-btn {
  padding: 14px 32px;
  font-size: 18px;
  font-weight: 500;
  background: #f9ead9;
  color: #03114F;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#start-btn:hover { background: #f0ddc8; }

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#cam-wrap {
  position: relative;
  width: 100%;
  max-width: 900px;
  border-radius: 18px;
  overflow: hidden;
  background: #142054;
  aspect-ratio: 4/3;
  border: 1px solid #0a2070;
}

#cam-dashboard-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(3, 17, 79, 0.85);
  border: 1px solid #0a2070;
  color: #f9ead9;
  font-size: 16px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 10;
  text-decoration: none;
  display: none;
}

#cam-dashboard-btn:hover {
  background: rgba(3, 17, 79, 1);
  color: #fff;
}

#cam-dashboard-btn.visible {
  display: block;
}

#result-panel {
  display: none;
  width: 100%;
  max-width: 900px;
  margin-top: 16px;
  background: #142054;
  border: 1px solid #0a2070;
  border-radius: 14px;
  padding: 22px;
  gap: 16px;
  flex-direction: column;
}

#result-panel.show { display: flex; }

#label-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

#label-input {
  flex: 1;
  padding: 12px 16px;
  font-size: 17px;
  background: #020d3a;
  border: 1px solid #0a2070;
  border-radius: 10px;
  color: #f0f0f0;
  outline: none;
}

#label-input:focus { border-color: #f9ead9; }

.instr-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

#instr-input {
  flex: 1;
  padding: 12px 16px;
  font-size: 17px;
  background: #020d3a;
  border: 1px solid #0a2070;
  border-radius: 10px;
  color: #f0f0f0;
  outline: none;
  font-family: inherit;
  resize: vertical;
  min-height: 90px;
}

#instr-input:focus { border-color: #f9ead9; }

.mic-btn {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  background: #0a2070;
  border: 1px solid #1a3a9a;
  border-radius: 10px;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.mic-btn:hover { background: #1a3a9a; }
.mic-btn.listening { background: #3a1a1a; border-color: #f87171; animation: pulse 1s infinite; }

#save-btn {
  padding: 14px 24px;
  font-size: 17px;
  font-weight: 500;
  background: #f9ead9;
  color: #03114F;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  align-self: flex-end;
}

#save-btn:hover { background: #f0ddc8; }

#save-confirm {
  font-size: 17px;
  color: #f9ead9;
  display: none;
  align-self: flex-end;
}

#save-confirm.show { display: block; }

  </style>
</head>

<body>

  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='home.html'">←</button>
    <h1>Caretaker Scanner</h1>
    <a href="caretaker.html" class="dashboard-btn">Dashboard →</a>
  </div>

  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></svg>
    <div id="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="scan-line"></div>
    </div>
    <a href="caretaker.html" id="cam-dashboard-btn">📋 All saved objects</a>
    <div id="cam-start">
      <button id="start-btn">Enable Camera</button>
      <p>Allow camera access to start scanning</p>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Camera off</span>
  </div>

  <div id="controls">
    <button id="scan-btn" disabled>Scan Object</button>
  </div>

  <div id="result-panel">
    <div id="detected-text"></div>
    <div id="ai-result"></div>

    <div>
      <p class="field-label">Object name</p>
      <div id="label-row">
        <input id="label-input" type="text" placeholder='e.g. "pill bottle"' />
        <button class="mic-btn" id="mic-label" type="button">🎤</button>
      </div>
    </div>

    <div>
      <p class="field-label">Instructions for user (optional)</p>
      <div class="instr-row">
        <textarea id="instr-input" placeholder='e.g. "Take one tablet with water every morning."'></textarea>
        <button class="mic-btn" id="mic-instr" type="button">🎤</button>
      </div>
    </div>

    <button id="save-btn">Save Object</button>
    <div id="save-confirm">✓ Saved!</div>
  </div>

  <script>
    const API_KEY = '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'; // paste your OpenAI key here
    const STORAGE_KEY = 'accessibility_objects';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const camStart = document.getElementById('cam-start');
    const scanBtn = document.getElementById('scan-btn');
    const scanLine = document.getElementById('scan-line');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const resultPanel = document.getElementById('result-panel');
    const detectedText = document.getElementById('detected-text');
    const aiResult = document.getElementById('ai-result');
    const labelInput = document.getElementById('label-input');
    const instrInput = document.getElementById('instr-input');
    const saveBtn = document.getElementById('save-btn');
    const savedLabelsDiv = document.getElementById('saved-labels');
    const saveConfirm = document.getElementById('save-confirm');
    const camDashBtn = document.getElementById('cam-dashboard-btn');

    let lastDetections = [];
    let stream = null;

    function setStatus(text, mode) {
      statusText.textContent = text;
      statusDot.className = mode || '';
    }

    function getObjects() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveObjects(objects) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(objects));
    }

    function renderSavedPills() {
      const objects = getObjects();
      savedLabelsDiv.innerHTML = '';
      for (const s of objects) {
        const pill = document.createElement('div');
        pill.className = 'pill';
        pill.innerHTML = `<strong>${s.name}</strong>${s.instructions ? `<span>${s.instructions.slice(0, 30)}...</span>` : ''}`;
        savedLabelsDiv.appendChild(pill);
      }
    }

    function showOverlayLabels(matches) {
      overlay.innerHTML = '';
      if (!matches.length) return;
      const vw = video.offsetWidth;
      const vh = video.offsetHeight;
      matches.forEach((m, i) => {
        const cx = vw * (0.3 + i * 0.25);
        const cy = vh * 0.4;
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
        dot.setAttribute('r', 7); dot.setAttribute('fill', '#4ade80');
        dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', 2);
        overlay.appendChild(dot);
        const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
        fo.setAttribute('x', cx - 70); fo.setAttribute('y', cy - 52);
        fo.setAttribute('width', 140); fo.setAttribute('height', 36);
        fo.innerHTML = `<div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.85);color:#4ade80;font-size:13px;font-weight:600;padding:5px 10px;border-radius:14px;text-align:center;border:1px solid #4ade80;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">✓ ${m.name}</div>`;
        overlay.appendChild(fo);
      });
    }

    function checkMatches(detections) {
      const lc = detections.map(d => d.toLowerCase());
      return getObjects().filter(obj =>
        lc.some(d => d.includes(obj.name.toLowerCase()) || obj.name.toLowerCase().includes(d))
      );
    }

    startBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        camStart.style.display = 'none';
        scanBtn.disabled = false;
        camDashBtn.classList.add('visible');
        setStatus('Point at an object and tap Scan', 'active');
      } catch (e) {
        camStart.querySelector('p').textContent = 'Camera access denied. Check browser permissions.';
      }
    });

    function captureFrame() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(video, 0, 0, w, h);
      return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    }

    scanBtn.addEventListener('click', async () => {
      if (!stream) return;
      scanBtn.disabled = true;
      scanLine.classList.add('active');
      setStatus('Scanning...', 'scanning');
      overlay.innerHTML = '';
      saveConfirm.className = '';

      let base64;
      try { base64 = captureFrame(); }
      catch (e) { setStatus('Could not capture frame', ''); scanBtn.disabled = false; scanLine.classList.remove('active'); return; }

      resultPanel.className = 'show';
      const lang2 = localStorage.getItem('caretaker_lang') || 'en';
      detectedText.innerHTML = lang2 === 'en' ? 'Analyzing...' : '...';
      aiResult.textContent = '';
      labelInput.value = '';
      instrInput.value = '';

      try {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 500,
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64}` } },
                { type: 'text', text: 'You are an accessibility assistant. Identify ONLY the single most prominent object — the one closest to the camera or most centered in the frame. Ignore background objects. Respond ONLY with raw JSON: {"objects": ["name of object"], "description": "one friendly sentence about that object"}' }
              ]
            }]
          })
        });

        const data = await resp.json();
        const text = data.choices?.[0]?.message?.content || '';
        let parsed;
        try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
        catch (e) { parsed = { objects: [], description: text }; }

        lastDetections = parsed.objects || [];
        const matches = checkMatches(lastDetections);
        showOverlayLabels(matches);

        const objList = lastDetections.length ? lastDetections.join(', ') : 'nothing detected';
      const lang = localStorage.getItem('caretaker_lang') || 'en';

        async function t(text) {
          if (lang === 'en') return text;
          try {
            const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`);
            const d = await r.json();
            return d[0].map(x => x[0]).join('') || text;
          } catch { return text; }
        }

        const detWord = await t('Detected');
        const savedWord = await t('Already saved');
        const completeMsg = await t('Scan complete — add a label and save');

        detectedText.innerHTML = `<strong>${detWord}:</strong> ${objList}`;
        if (matches.length) {
          detectedText.innerHTML += `<br><span style="color:#4ade80">✓ ${savedWord}: ${matches.map(m => m.name).join(', ')}</span>`;
        }
        aiResult.textContent = parsed.description || '';
        if (lastDetections.length) labelInput.value = lastDetections[0];
        setStatus(completeMsg, 'active');

      } catch (e) {
        detectedText.innerHTML = '<span style="color:#f87171">Scan failed — check your API key</span>';
        console.error(e);
        setStatus('Error', '');
      }

      scanLine.classList.remove('active');
      scanBtn.disabled = false;
    });

    saveBtn.addEventListener('click', () => {
      const name = labelInput.value.trim();
      if (!name) { labelInput.focus(); return; }
      const instructions = instrInput.value.trim();
      const objects = getObjects();
      const existing = objects.findIndex(o => o.name.toLowerCase() === name.toLowerCase());
      if (existing >= 0) {
        objects[existing] = { name, instructions };
      } else {
        objects.push({ name, instructions });
      }
      saveObjects(objects);
      labelInput.value = '';
      instrInput.value = '';
      saveConfirm.className = 'show';
      setTimeout(() => saveConfirm.className = '', 3000);
    });

    labelInput.addEventListener('keydown', e => { if (e.key === 'Enter') instrInput.focus(); });
    // ── Translate scanner page to caretaker language ──────────────────────────
      function translateEl(id, text, lang) {
        fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`)
          .then(r => r.json())
          .then(data => { document.getElementById(id).textContent = data[0].map(x => x[0]).join('') || text; })
          .catch(() => { });
      }

      function translateScanner() {
        const lang = localStorage.getItem('caretaker_lang') || 'en';
        if (lang === 'en') return;

        const items = [
          { id: null, el: document.querySelector('.topbar h1'), text: 'Caretaker Scanner' },
          { id: null, el: document.querySelector('.dashboard-btn'), text: 'Dashboard →' },
          { id: null, el: document.getElementById('cam-dashboard-btn'), text: '📋 All saved objects' },
          { id: null, el: document.getElementById('start-btn'), text: 'Enable Camera' },
          { id: null, el: document.getElementById('scan-btn'), text: 'Scan Object' },
          { id: null, el: document.getElementById('save-btn'), text: 'Save Object' },
          { id: null, el: document.getElementById('save-confirm'), text: '✓ Saved! User will see this when they scan it.' },
          { id: null, el: document.querySelector('#cam-start p'), text: 'Allow camera access to start scanning' },
        ];

        // translate field labels
        document.querySelectorAll('.field-label').forEach((el, i) => {
          const texts = ['Object name', 'Instructions for user (optional)'];
          if (texts[i]) {
            fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(texts[i])}`)
              .then(r => r.json())
              .then(data => { el.textContent = data[0].map(x => x[0]).join('') || texts[i]; })
              .catch(() => { });
          }
        });

        items.forEach(item => {
          if (!item.el) return;
          fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(item.text)}`)
            .then(r => r.json())
            .then(data => { item.el.textContent = data[0].map(x => x[0]).join('') || item.text; })
            .catch(() => { });
        });
      }

      translateScanner();


      function setupMic(btnId, targetInput) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          btn.style.opacity = '0.4';
          btn.style.cursor = 'not-allowed';
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        let listening = false;

        btn.addEventListener('click', () => {
          if (listening) { recognition.stop(); return; }
          recognition.start();
        });

        recognition.addEventListener('start', () => {
          listening = true;
          btn.classList.add('listening');
          btn.textContent = '⏹';
        });

        recognition.addEventListener('result', (e) => {
          targetInput.value = e.results[0][0].transcript;
        });

        recognition.addEventListener('end', () => {
          listening = false;
          btn.classList.remove('listening');
          btn.textContent = '🎤';
        });

        recognition.addEventListener('error', (e) => {
          listening = false;
          btn.classList.remove('listening');
          btn.textContent = '🎤';
          if (e.error === 'not-allowed') alert('Microphone access denied.');
        });
      }

      setupMic('mic-label', document.getElementById('label-input'));
      setupMic('mic-instr', document.getElementById('instr-input'));
  </script>
</body>

</html>
